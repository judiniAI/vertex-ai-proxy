#:schema node_modules/wrangler/config-schema.json
name = "vertex-ai-gateway"
# account_id is read from CLOUDFLARE_ACCOUNT_ID env var
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# --- Uncomment and configure your custom domain ---
# [routes]
# route = "your-gateway.example.com/*"

# --- Environment variables (set via wrangler secret or .dev.vars) ---
# VERTEX_PROJECT_ID             - Your Google Cloud project ID
# VERTEX_REGION                 - Vertex AI region (e.g. "us-central1" or "global")
# VERTEX_SERVICE_ACCOUNT_JSON   - Full GCP service account JSON key
# API_KEY                       - A secret key clients must send to authenticate
